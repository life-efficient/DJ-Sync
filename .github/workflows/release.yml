name: Release Package

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: false
    permissions:
      id-token: write
    steps:
      - name: Reserved for PyPI Trusted Publishing
        run: |
          echo "Enable this job after configuring a Trusted Publisher on PyPI."
